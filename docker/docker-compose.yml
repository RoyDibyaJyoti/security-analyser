version: '3.8'

services:
  security-analyzer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: security-analyzer
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - PORT=8000
      - BLOCK_INTERNAL_IPS=True
      # Add API keys as needed:
      # - VIRUSTOTAL_API_KEY=your_key_here
    volumes:
      - ../logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - security-net

  # Optional: Add Redis for production scan tracking
  # redis:
  #   image: redis:7-alpine
  #   container_name: security-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - security-net

networks:
  security-net:
    driver: bridge

volumes:
  redis-data: